<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Teachers</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #4facfe, #00f2fe);
}

/* Back Button */
.back {
    position: absolute;
    top: 15px;
    left: 15px;
    background: white;
    padding: 8px 15px;
    border-radius: 10px;
    text-decoration: none;
    color: black;
    font-weight: bold;
}

/* Heading */
h1 {
    text-align: center;
    color: white;
    margin-top: 50px;
}

/* Container */
.container {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 30px;
}

/* Card */
.card {
    background: white;
    width: 90%;
    max-width: 350px;
    margin: 10px;
    padding: 15px;
    border-radius: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    text-align: center;
}

/* Name */
.name {
    font-size: 18px;
    font-weight: bold;
}

/* Number */
.number {
    margin-top: 5px;
    font-size: 16px;
    color: #555;
}
</style>

</head>
<body>

<!-- Back Button -->
<a href="dashboard.html" class="back">⬅ Back</a>

<h1>Contact Teachers</h1>

<div class="container">

    <!-- Teacher 1 -->
    <div class="card">
        <div class="name">👨‍🏫 Sanjay Sir</div>
        <div class="number">📞 9876543210</div>
    </div>

    <!-- Teacher 2 -->
    <div class="card">
        <div class="name">👨‍🏫 Ranjan Sir</div>
        <div class="number">📞 9123456780</div>
    </div>

    <!-- Teacher 3 -->
    <div class="card">
        <div class="name">👨‍🏫 Ranjeet Sir</div>
        <div class="number">📞 9012345678</div>
    </div>

</div>

</body>
</html>
