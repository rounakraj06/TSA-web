<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admission Form</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f5f5f5;
}

/* Back button */
.back {
    position: absolute;
    top: 10px;
    left: 10px;
    text-decoration: none;
}

/* Form box */
.form-box {
    width: 90%;
    max-width: 350px;
    margin: 70px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

/* Heading */
h2 {
    text-align: center;
}

/* Inputs */
input, select, textarea {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: 1px solid #ccc;
    border-radius: 5px;
}

/* Button */
button {
    width: 100%;
    padding: 10px;
    background: #4facfe;
    color: white;
    border: none;
    border-radius: 5px;
}
</style>

</head>
<body>

<a href="admission-dashboard.html" class="back">⬅ Back</a>

<div class="form-box">

<h2>Admission Form</h2>

<form onsubmit="submitForm(event)">

<input type="text" placeholder="Student Name" required>

<input type="text" placeholder="Father's Name" required>

<input type="date" required>

<select required>
<option value="">Select Class</option>
<option>Class 8</option>
<option>Class 9</option>
<option>Class 10</option>
</select>

<input type="text" placeholder="School Name" required>

<input type="tel" placeholder="Phone Number" required>

<textarea placeholder="Address" rows="3" required></textarea>

<button type="submit">Submit</button>

</form>

</div>

<script>
function submitForm(e) {
    e.preventDefault();
    alert("Your admission form has been submitted successfully!");
}
</script>

</body>
</html>
